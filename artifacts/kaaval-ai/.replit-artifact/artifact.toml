kind = "web"
previewPath = "/"
title = "Kaaval AI"
version = "1.0.0"
id = "artifacts/kaaval-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25551

[services.development]
run = "pnpm --filter @workspace/kaaval-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kaaval-ai", "run", "build" ]
publicDir = "artifacts/kaaval-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25551"
BASE_PATH = "/"
